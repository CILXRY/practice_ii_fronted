<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>答题练习</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4edf9 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        max-width: 600px;
        width: 100%;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        padding: 30px;
      }
      h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 24px;
        font-size: 24px;
      }
      .question {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 24px;
        color: #34495e;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
      }
      .option {
        position: relative;
        padding-left: 36px;
        cursor: pointer;
        user-select: none;
        font-size: 16px;
        color: #2c3e50;
        transition: color 0.2s;
      }
      .option:hover {
        color: #3498db;
      }
      .option input {
        position: absolute;
        opacity: 0;
        cursor: pointer;
      }
      .checkmark {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        height: 20px;
        width: 20px;
        background-color: #f1f3f5;
        border: 2px solid #cbd5e0;
        border-radius: 50%;
        transition: all 0.2s;
      }
      .option input:checked ~ .checkmark {
        background-color: #3498db;
        border-color: #3498db;
      }
      .checkmark::after {
        content: "";
        position: absolute;
        display: none;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .option input:checked ~ .checkmark::after {
        display: block;
      }

      button {
        width: 100%;
        padding: 14px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background: #2980b9;
      }
      button:disabled {
        background: #bdc3c7;
        cursor: not-allowed;
      }

      .result {
        margin-top: 20px;
        padding: 16px;
        border-radius: 8px;
        font-weight: bold;
        text-align: center;
        display: none;
      }
      .result.correct {
        background: #d4edda;
        color: #155724;
        display: block;
      }
      .result.incorrect {
        background: #f8d7da;
        color: #721c24;
        display: block;
      }
      .explanation {
        margin-top: 10px;
        font-weight: normal;
        font-size: 14px;
        color: #666;
      }

      .loading {
        text-align: center;
        color: #7f8c8d;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>答题练习</h1>
      <div class="question" id="question">加载中...</div>
      <div class="options" id="options"></div>
      <button id="submitBtn" onclick="submitAnswer()" disabled>提交答案</button>
      <div class="result" id="result"></div>
      <div class="loading" id="loading" style="display: none">
        正在获取题目...
      </div>
    </div>

    <script>
      let currentQuestion = null;

      // 获取新题目
      async function fetchQuestion() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("result").style.display = "none";

        try {
          const res = await fetch("/api/get_question"); // 你的后端接口
          const data = await res.json();
          if (data.error) {
            alert("获取题目失败：" + data.error);
            return;
          }
          renderQuestion(data);
        } catch (err) {
          console.error(err);
          alert("网络错误，请检查后端是否运行");
        } finally {
          document.getElementById("loading").style.display = "none";
        }
      }

      function renderQuestion(q) {
        currentQuestion = q;
        document.getElementById("question").innerText = q.question;

        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";

        if (q.type === "true_false") {
          // 判断题：两个选项
          const choices = ["正确", "错误"];
          choices.forEach((text, index) => {
            const letter = String.fromCharCode(65 + index); // A, B
            const label = document.createElement("label");
            label.className = "option";
            label.innerHTML = `
        <input type="radio" name="answer" value="${letter}" onchange="enableSubmit()">
        <span class="checkmark"></span>
        ${letter}. ${text}
      `;
            optionsContainer.appendChild(label);
          });
        } else {
          // 单选题：4个选项
          q.options.forEach((text, index) => {
            const letter = String.fromCharCode(65 + index); // A, B, C, D
            const label = document.createElement("label");
            label.className = "option";
            label.innerHTML = `
        <input type="radio" name="answer" value="${letter}" onchange="enableSubmit()">
        <span class="checkmark"></span>
        ${letter}. ${text}
      `;
            optionsContainer.appendChild(label);
          });
        }

        document.getElementById("submitBtn").disabled = true;
      }
      function enableSubmit() {
        const btn = document.getElementById("submitBtn");
        if (btn) btn.disabled = false;
      }
      // 页面加载时隐藏
      document.addEventListener("DOMContentLoaded", () => {
        const resultDiv = document.getElementById("result");
        if (resultDiv) {
          resultDiv.style.display = "none";
        }
      });

      async function submitAnswer() {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected) return;

        const answer = selected.value;
        const resultDiv = document.getElementById("result");

        try {
          const res = await fetch("/api/submit_answer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              question_text: currentQuestion.question,
              answer: answer,
            }),
          });
          const data = await res.json();

          resultDiv.innerHTML = "";
          resultDiv.style.display = "block"; // ✅ 显示结果

          if (data.correct) {
            resultDiv.className = "result correct";
            resultDiv.innerHTML = "✅ 回答正确！";
          } else {
            resultDiv.className = "result incorrect";
            resultDiv.innerHTML = "❌ 回答错误！";
            if (data.explanation) {
              resultDiv.innerHTML += `<div class="explanation">${data.explanation}</div>`;
            }
          }

          setTimeout(fetchQuestion, 3000);
        } catch (err) {
          console.error(err);
          alert("提交失败，请重试");
        }
      }

      // 页面加载时获取第一题
      window.onload = fetchQuestion;
    </script>
  </body>
</html>
